<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einfach fragen</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #fff8f0; padding: 40px; }
        .btn { width: 300px; padding: 25px; margin: 15px; border: none; border-radius: 15px; background-color: #e67e22; color: white; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #d35400; }
        #output { margin-top: 25px; padding: 20px; background: white; border-radius: 15px; width: 80%; max-width: 600px; min-height: 100px; display: none; box-shadow: 0 6px 12px rgba(0,0,0,0.1); font-size: 20px; line-height: 1.5; color: #333; }
    </style>
</head>
<body>
    <h1 style="color: #cc6600;">Einfach fragen</h1>
    <p style="font-size: 24px;">Was möchtest du heute tun?</p>
    
    <button class="btn" onclick="askAI('Schreib einen kurzen, lustigen Brief über einen Hans, der nachts Webseiten baut.')">📝 Brief schreiben</button>
    <button class="btn" onclick="alert('Foto-Funktion kommt bald!')">📷 Foto verbessern</button>
    <button class="btn" onclick="alert('Frage-Funktion kommt bald!')">❓ Frage stellen</button>
    <button class="btn" onclick="alert('Spiele-Funktion kommt bald!')">🎮 Spielen</button>

    <div id="output"></div>

    <script>
        async function askAI(promptText) {
            const outputDiv = document.getElementById('output');
            outputDiv.style.display = 'block';
            outputDiv.innerText = 'KI denkt nach... einen Moment...';

            try {
                const response = await fetch('/.netlify/functions/fragen', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptText })
                });
                const data = await response.json();
                outputDiv.innerText = data.reply || 'Keine Antwort erhalten.';
            } catch (error) {
                outputDiv.innerText = 'Fehler bei der Verbindung: ' + error.message;
            }
        }
    </script>
</body>
</html>
